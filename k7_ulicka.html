<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>K7 – Záchranářská ulička</title>
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Inter, Arial, sans-serif;
      background: #07111f;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .wrap {
      position: relative;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background: #07111f;
    }

    .bg {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
      background: #07111f;
    }

    .text {
      position: absolute;
      left: 50%;
      bottom: 34px;
      transform: translateX(-50%);
      padding: 16px 24px;
      border-radius: 20px;
      background: rgba(7, 17, 31, 0.72);
      border: 1px solid rgba(255,255,255,0.12);
      font-size: clamp(24px, 4vw, 42px);
      font-weight: 900;
      text-align: center;
      box-shadow: 0 12px 30px rgba(0,0,0,0.28);
      backdrop-filter: blur(8px);
    }

    .back {
      position: absolute;
      top: 18px;
      left: 18px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 12px 16px;
      border-radius: 14px;
      background: rgba(7, 17, 31, 0.72);
      border: 1px solid rgba(255,255,255,0.12);
      color: white;
      text-decoration: none;
      font-weight: 800;
      backdrop-filter: blur(8px);
    }
  </style>
</head>
<body>
  <div class="wrap">
    <img class="bg" src="Bez názvu.png" alt="Záchranářská ulička" />
    <a class="back" href="k7.html">← Zpět</a>
    <div class="text">Jednoduché, ne?</div>
  </div>
</body>
</html>
